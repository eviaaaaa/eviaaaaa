name: Update PR Activity README

on:
  schedule:
    # 设置定时任务：每 12 小时自动巡查一次你的最新 PR
    - cron: "0 */12 * * *"
  workflow_dispatch: # 提供一个按钮，允许你随时手动强制触发更新

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update this repo's README with recent PRs
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate PR list and update README
        id: update_readme
        uses: actions/github-script@v7
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          TARGET_FILE: README.md
          PAGE_SIZE: 7
          MAX_PAGES: 5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const username = process.env.GH_USERNAME;
            const targetFile = process.env.TARGET_FILE || 'README.md';
            const pageSize = Number(process.env.PAGE_SIZE || 7);
            const maxPages = Number(process.env.MAX_PAGES || 5);
            const maxItems = pageSize * maxPages;

            const query = `author:${username} is:pr`;
            const res = await github.rest.search.issuesAndPullRequests({
              q: query,
              sort: 'updated',
              order: 'desc',
              per_page: maxItems,
            });

            const prs = res.data.items || [];
            
            const chunks = [];
            for (let i = 0; i < prs.length; i += pageSize) {
              chunks.push(prs.slice(i, i + pageSize));
            }

            let rendered = '';
            if (chunks.length === 0) {
              rendered = '1. 暂无可展示的 PR';
            } else {
              rendered += chunks[0].map((item, idx) => {
                const matched = item.html_url.match(/github\.com\/([^/]+\/[^/]+)\/pull\//);
                const repo = matched ? matched[1] : 'unknown/unknown';
                return `${idx + 1}. [${item.title}](${item.html_url}) in [${repo}](https://github.com/${repo})`;
              }).join('\n');

              for (let i = 1; i < chunks.length; i++) {
                rendered += `\n\n<details>\n<summary><b>👉 翻页查看更多 (第 ${i + 1} 页)</b></summary>\n\n`;
                rendered += chunks[i].map((item, idx) => {
                  const matched = item.html_url.match(/github\.com\/([^/]+\/[^/]+)\/pull\//);
                  const repo = matched ? matched[1] : 'unknown/unknown';
                  return `${i * pageSize + idx + 1}. [${item.title}](${item.html_url}) in [${repo}](https://github.com/${repo})`;
                }).join('\n');
                rendered += '\n\n</details>';
              }
            }

            const start = '<!--START_SECTION:activity-->';
            const end = '<!--END_SECTION:activity-->';
            const original = fs.readFileSync(targetFile, 'utf8');

            const startIdx = original.indexOf(start);
            const endIdx = original.indexOf(end);
            if (startIdx === -1 || endIdx === -1 || startIdx >= endIdx) {
              core.setFailed('README 中未找到有效的 activity 注释区块');
              return;
            }

            const before = original.slice(0, startIdx + start.length);
            const after = original.slice(endIdx);
            const updated = `${before}\n${rendered}\n${after}`;

            fs.writeFileSync(targetFile, updated);
            core.setOutput('changed', original !== updated ? 'true' : 'false');

      - name: Commit and push
        if: steps.update_readme.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "⚡ 自动更新：最近的 PR 列表"
          git push
